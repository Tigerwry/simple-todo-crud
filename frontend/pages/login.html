<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In · Todo App</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=DM+Sans:wght@400;500;700&family=Bungee&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/animation.css" />
  </head>
  <body data-page="login">
    <main class="app auth-shell">
      <div class="card animate-pulse-glow" style="max-width: 460px; width: 100%">
        <div class="stack" style="align-items: center; text-align: center">
          <div class="brand" style="justify-content: center">
            <span class="logo-badge animate-wiggle" aria-hidden="true">✅</span>
          </div>
          <p class="eyebrow">Welcome back</p>
          <h1 class="gradient-text" style="font-size: clamp(2.5rem, 9vw, 4rem)">Log In</h1>
          <p class="muted-text">Your tasks missed you. Let's get back to it. 🚀</p>
        </div>

        <form id="login-form" class="stack" style="margin-top: 28px" novalidate>
          <div class="field">
            <label for="login-email">Email</label>
            <input class="input" id="login-email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
            <span class="field-error" data-error="email"></span>
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <input class="input" id="login-password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
            <span class="field-error" data-error="password"></span>
          </div>
          <button class="btn btn-primary btn-block" type="submit">🚀 Log in</button>
        </form>

        <p class="muted-text" style="text-align: center; margin-top: 22px">
          No account yet? <a href="/pages/register.html">Create one →</a>
        </p>
      </div>
    </main>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
